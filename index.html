<!DOCTYPE html>

    <title>Osobní stránka</title>
    <link rel="stylesheet" href="style.css" />

        <h2 id="zajmy-heading">Moje zájmy</h2>
        <ul>
          <li>💻 Technologie a webový vývoj</li>
          <li>📚 Čtení knih a osobní rozvoj</li>
